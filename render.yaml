services:
  - type: web
    name: threads-and-traditions
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: threads-traditions-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://threads-and-traditions.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: threads-traditions-db
    plan: free
    databaseName: threads_traditions
